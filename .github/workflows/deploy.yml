name: Deploy to GitHub Pages

on:
  # build on every push to main
  push:
    branches: [main]
  # allow manual runs from the Actions tab
  workflow_dispatch:

# permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# only one Pages deploy at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3 # installs deps + builds + uploads the artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
